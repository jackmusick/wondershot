name: Release

# Tag-gated: pushing a `v*` tag (e.g. v0.1.0) builds the Linux Tauri bundles
# (AppImage + rpm + deb) and the Flatpak, uploading them to a DRAFT prerelease
# for review before publishing. M6 is Linux-first (per the rewrite roadmap);
# macOS/Windows packaging is deferred. Builds are UNSIGNED.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    # NOT ubuntu-latest: pinned for libwebkit2gtk-4.1 availability (Tauri's
    # Linux webview), matching the wonderblob release pipeline.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Linux deps (Tauri + gstreamer for the recorder)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            patchelf ffmpeg \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-pipewire

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `beforeBuildCommand` (npm run build) then `tauri build`
      # and attaches every produced installer (AppImage/rpm/deb) to the release.
      # --features bgremove compiles in the ONNX background-removal path.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Wondershot ${{ github.ref_name }}"
          releaseBody: "Unsigned Linux builds. AppImage (curl|sh path), rpm, and the Flatpak bundle. Download the asset for your install method."
          releaseDraft: true
          prerelease: true
          args: "--features bgremove"

      - name: Build & attach Flatpak
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

          # tauri-action leaves the deb under the workspace target dir; the
          # manifest expects it copied in as wondershot.deb. productName is
          # "Wondershot", so the file is Wondershot_<ver>_amd64.deb.
          deb=$(find target src-tauri/target -path '*/bundle/deb/*' \
            -iname 'wondershot_*_amd64.deb' 2>/dev/null | head -n1)
          test -n "$deb" || { echo "no deb found under target/**/bundle/deb"; exit 1; }
          cp "$deb" packaging/flatpak/wondershot.deb

          flatpak-builder --user --force-clean --repo=fp-repo \
            fp-build packaging/flatpak/io.github.jackmusick.wondershot.yml
          # --runtime-repo is mandatory: without it the bundle can't fetch
          # org.gnome.Platform on machines that don't already have it.
          flatpak build-bundle \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
            fp-repo wondershot.flatpak io.github.jackmusick.wondershot

          gh release upload "${{ github.ref_name }}" wondershot.flatpak --clobber
