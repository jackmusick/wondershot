name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Qt offscreen runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libpulse0

        # libegl1 is the hard requirement for importing PySide6 offscreen
        # on ubuntu-latest; the rest are cheap insurance for QtGui/QtWidgets.
        # libpulse0: libQt6Multimedia.so.6 has a NEEDED on libpulse.so.0 and
        # tests/test_video_filter.py imports wondershot.video at module level.

      - name: Install package
        run: python -m pip install -e . pytest

      - name: Import smoke
        run: python -c "import wondershot; print(wondershot.__version__)"

      - name: Tests
        run: python -m pytest tests/ -v
