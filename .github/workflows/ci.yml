name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux deps (Tauri + recorder)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-pipewire ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Stage Windows FFmpeg sidecar
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/Prepare-WindowsFfmpeg.ps1

      - name: Frontend typecheck
        run: npm run check

      - name: Frontend unit tests
        run: npm test

      - name: Rust check
        run: cargo check --workspace --all-targets

      - name: Rust core tests
        run: cargo test -p wondershot-core

      - name: Tauri build smoke
        run: npx tauri build --no-bundle
