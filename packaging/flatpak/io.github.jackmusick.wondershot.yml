# Flatpak manifest — the Tauri Wondershot bundle (one install, real menu integration).
#
# Local build + run (needs the .deb next to this file, named wondershot.deb):
#   npm run tauri build -- --features bgremove
#   cp src-tauri/target/release/bundle/deb/Wondershot_*_amd64.deb \
#     packaging/flatpak/wondershot.deb
#   flatpak-builder --user --install --force-clean build-dir \
#     packaging/flatpak/io.github.jackmusick.wondershot.yml
#   flatpak run io.github.jackmusick.wondershot
#
# Like wonderblob's manifest, this does NOT compile Rust/JS in the sandbox —
# it unpacks the prebuilt .deb and relies on org.gnome.Platform for
# webkit2gtk-4.1. The KDE runtime ships GTK3+libsoup3 but NOT webkit, so the
# GNOME runtime is the practical webview host; KWin scripting + portals still
# work via the host D-Bus regardless of runtime. ffmpeg/x264/wl-clipboard/
# onnxruntime/u2net are added as modules because the GNOME runtime doesn't
# ship them and Wondershot shells out to / loads them at runtime.
app-id: io.github.jackmusick.wondershot
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: wondershot

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Recorder: portal ScreenCast negotiates the PipeWire stream
  - --filesystem=xdg-run/pipewire-0
  - --socket=pulseaudio
  # Library lives wherever the user configured it (e.g. ~/Sync/Screenshots) +
  # watched video dirs + the shared ~/.config/wondershot/wondershot.conf. The
  # non-Flatpak install had full home access; a screenshot manager genuinely
  # needs the user's chosen folders, so grant home rather than guess subpaths.
  - --filesystem=home
  # KWin scripting (auto-size-to-window); host D-Bus, runtime-independent
  - --talk-name=org.kde.KWin
  # Run the HOST's Spectacle (its rectangular drag-selection UI) for captures via
  # flatpak-spawn --host — the sandbox has no spectacle.
  - --talk-name=org.freedesktop.Flatpak
  # Portals (screenshot/screencast) ride the session bus
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.OpenURI
  # AI background removal loads the bundled u2net model from /app/share
  - --env=WONDERSHOT_U2NET=/app/share/wondershot/u2net.onnx

modules:
  # libx264: not in the GNOME SDK; ffmpeg below (and the video render path)
  # needs it. Commit-pinned tarball (stable branch head).
  - name: x264
    config-opts:
      - --enable-shared
      - --disable-cli
    sources:
      - type: archive
        url: https://code.videolan.org/videolan/x264/-/archive/b35605ace3ddf7c1a5d67a2eb553f034aef41d55/x264-b35605ace3ddf7c1a5d67a2eb553f034aef41d55.tar.bz2
        sha256: 6eeb82934e69fd51e043bd8c5b0d152839638d1ce7aa4eea65a3fedcf83ff224

  # ffmpeg CLI: Wondershot's video commands spawn the binary.
  - name: ffmpeg
    config-opts:
      - --disable-debug
      - --disable-doc
      - --disable-ffplay
      - --enable-gpl
      - --enable-libx264
      - --enable-shared
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6

  # wl-clipboard: provides wl-copy. On Wayland the compositor grants the
  # selection only to a focused client; our auto-copy runs with the window
  # hidden. wl-copy holds the selection via data-control, focus-independent.
  - name: wl-clipboard
    buildsystem: meson
    # The GNOME SDK's meson auto-detects fish/zsh and installs completions to
    # absolute system dirs (/usr/share/fish/...) outside the build prefix, which
    # is read-only in the flatpak sandbox. Disable them — wl-copy is all we need.
    config-opts:
      - -Dfishcompletiondir=no
      - -Dzshcompletiondir=no
    sources:
      - type: archive
        url: https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v2.2.1.tar.gz
        sha256: 6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb

  # onnxruntime: prebuilt shared lib for ort's load-dynamic backend. ort
  # rc.12 targets ORT 1.24 (api-24); 1.26 is forward-compatible. The system
  # loader finds libonnxruntime.so in /app/lib (ORT_DYLIB_PATH left unset).
  - name: onnxruntime
    buildsystem: simple
    build-commands:
      - install -Dm755 lib/libonnxruntime.so.1.26.0 /app/lib/libonnxruntime.so.1.26.0
      - ln -s libonnxruntime.so.1.26.0 /app/lib/libonnxruntime.so
    sources:
      - type: archive
        url: https://github.com/microsoft/onnxruntime/releases/download/v1.26.0/onnxruntime-linux-x64-1.26.0.tgz
        sha256: 1254da24fb389cf39dc0ff3451ab48301740ffbfcbaf646849df92f80ee92c57

  # u2net model (bundled; offline-safe). Resolved via WONDERSHOT_U2NET above.
  - name: u2net-model
    buildsystem: simple
    build-commands:
      - install -Dm644 u2net.onnx /app/share/wondershot/u2net.onnx
    sources:
      - type: file
        url: https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx
        sha256: 8d10d2f3bb75ae3b6d527c77944fc5e7dcd94b29809d47a739a7a728a912b491

  # The Tauri app: unpack the prebuilt .deb (ar -> data.tar.* -> usr/ tree).
  - name: wondershot
    buildsystem: simple
    build-commands:
      - ar x wondershot.deb
      - mkdir -p deb-root
      - tar -xf data.tar.* -C deb-root
      - install -Dm755 deb-root/usr/bin/wondershot ${FLATPAK_DEST}/bin/wondershot
      # Desktop file, renamed to the app-id with Icon= pointed at the app-id.
      - |
        src_desktop=$(ls deb-root/usr/share/applications/*.desktop | head -n1)
        sed 's/^Icon=.*/Icon=io.github.jackmusick.wondershot/' "$src_desktop" \
          > ${FLATPAK_ID}.desktop
        install -Dm644 ${FLATPAK_ID}.desktop \
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      # Icons: copy every size/format the deb shipped, renamed to the app-id.
      - |
        for icon in $(find deb-root/usr/share/icons -type f); do
          dir=$(dirname "$icon" | sed 's|deb-root/usr/share/icons|share/icons|')
          ext="${icon##*.}"
          install -Dm644 "$icon" "${FLATPAK_DEST}/${dir}/${FLATPAK_ID}.${ext}"
        done
    sources:
      - type: file
        path: wondershot.deb
